# Vorlage für deinen bestehenden Nginx auf dem Linux-Server.
# Datei nach /etc/nginx/sites-available/sticker kopieren,
# Domain anpassen, dann: sudo ln -s /etc/nginx/sites-available/sticker /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name sticker.deine-domain.de;
    # HTTP → HTTPS weiterleiten
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sticker.deine-domain.de;

    # SSL-Zertifikate via Certbot (sudo certbot --nginx -d sticker.deine-domain.de)
    ssl_certificate     /etc/letsencrypt/live/sticker.deine-domain.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sticker.deine-domain.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Alles geht an den Frontend-Container (der proxyt /api intern ans Backend)
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

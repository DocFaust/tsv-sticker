spring.application.name=tsv-sticker-backend
server.port=8080

# PostgreSQL – Werte kommen aus Umgebungsvariablen (Docker Compose setzt diese)
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/stickerdb}
spring.datasource.username=${DB_USER:sticker}
spring.datasource.password=${DB_PASSWORD:sticker}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
